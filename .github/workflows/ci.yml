name: Rust validation

on:
  push:
    branches:
      - main
      - tdi-2-branching
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  formatting:
    name: Formatting
    runs-on: [self-hosted, Linux, ARM64, jetson, tdi]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

  tests:
    name: Tests
    runs-on: [self-hosted, Linux, ARM64, jetson, tdi]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

  clippy:
    name: Clippy
    runs-on: [self-hosted, Linux, ARM64, jetson, tdi]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  integrity:
    name: Preregistration integrity
    runs-on: [self-hosted, Linux, ARM64, jetson, tdi]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify preregistration hash
        run: |
          sha256sum -c \
            docs/TDI-2-CONTINUOUS-PREREGISTRATION.sha256
