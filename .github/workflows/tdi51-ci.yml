name: TDI-5.1 CI

on:
  push:
    branches:
      - tdi-5.1-continuous-deficit-geometry
      - tdi-51-continuous-deficit-geometry
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tdi51-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_HOME: /mnt/nvme/github-runners/home/.cargo
  RUSTUP_HOME: /mnt/nvme/github-runners/home/.rustup
  CARGO_TARGET_DIR: /mnt/nvme/github-runners/cache/tdi/tdi51-ci

jobs:
  validation:
    name: TDI-5.1 validation
    runs-on: [self-hosted, Linux, ARM64, jetson, tdi]
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git init .

          git remote remove origin 2>/dev/null || true
          git remote add origin \
            "https://github.com/${GITHUB_REPOSITORY}.git"

          AUTH_HEADER="$(
            printf 'x-access-token:%s' "$GITHUB_TOKEN" |
              base64 -w 0
          )"

          git \
            -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${AUTH_HEADER}" \
            fetch \
              --no-tags \
              --prune \
              --depth=1 \
              origin \
              "$GITHUB_REF"

          git checkout \
            --force \
            --detach \
            "$GITHUB_SHA"

          git clean -ffdx

      - name: Configure shared Rust
        run: |
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"
          mkdir -p "$CARGO_TARGET_DIR"
          "$CARGO_HOME/bin/rustc" --version
          "$CARGO_HOME/bin/cargo" --version
          "$CARGO_HOME/bin/rustfmt" --version
          "$CARGO_HOME/bin/cargo" clippy --version

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run workspace tests offline
        run: cargo test --workspace --offline

      - name: Run Clippy offline
        run: cargo clippy --workspace --all-targets --offline -- -D warnings

      - name: Verify frozen TDI-5 hashes
        run: |
          sha256sum -c \
            docs/TDI-5-CONTINUOUS-DEFICIT-GEOMETRY-PREREGISTRATION.sha256
          sha256sum -c \
            docs/TDI-5-CONTINUOUS-DEFICIT-GEOMETRY-EVALUATOR.sha256
          sha256sum -c \
            docs/TDI-5-SCIENTIFIC-CODE.sha256

      - name: Verify TDI-5.1 hashes and shell syntax
        run: |
          sha256sum -c \
            docs/TDI-5.1-CONTINUOUS-DEFICIT-GEOMETRY-PREREGISTRATION.sha256
          sha256sum -c \
            docs/TDI-5.1-CONTINUOUS-DEFICIT-GEOMETRY-EVALUATOR.sha256
          sha256sum -c \
            docs/TDI-5.1-SCIENTIFIC-CODE.sha256
          bash -n scripts/reproduce-tdi5.sh
          bash -n scripts/reproduce-tdi5.1.sh

      - name: Bounded termination smoke test
        run: >-
          cargo run
          --offline
          --bin tdi-continuous-deficit-geometry-v51
          --
          --termination-smoke
