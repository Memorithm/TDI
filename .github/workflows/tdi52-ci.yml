name: TDI-5.2 CI

on:
  push:
    branches:
      - main
      - experiment/tdi-5.2-independent-overlap-ablation
      - claude/tdi-5-2-overlap-ablation-fbr9w5
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tdi52-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_HOME: /mnt/nvme/github-runners/home/.cargo
  RUSTUP_HOME: /mnt/nvme/github-runners/home/.rustup

jobs:
  validation:
    name: TDI-5.2 validation
    runs-on: [self-hosted, Linux, ARM64, jetson, tdi]
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git init .

          git remote remove origin 2>/dev/null || true
          git remote add origin \
            "https://github.com/${GITHUB_REPOSITORY}.git"

          AUTH_HEADER="$(
            printf 'x-access-token:%s' "$GITHUB_TOKEN" |
              base64 -w 0
          )"

          git \
            -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${AUTH_HEADER}" \
            fetch \
              --no-tags \
              --prune \
              --depth=1 \
              origin \
              "$GITHUB_REF"

          git checkout \
            --force \
            --detach \
            "$GITHUB_SHA"

          git clean -ffdx

      - name: Configure shared Rust
        run: |
          TARGET_DIR="${{ runner.temp }}/tdi52-target"

          echo "CARGO_TARGET_DIR=$TARGET_DIR" >> "$GITHUB_ENV"
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"

          mkdir -p "$TARGET_DIR"

          "$CARGO_HOME/bin/rustc" --version
          "$CARGO_HOME/bin/cargo" --version
          "$CARGO_HOME/bin/rustfmt" --version
          "$CARGO_HOME/bin/cargo" clippy --version

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run workspace tests offline
        run: cargo test --workspace --offline

      - name: Run Clippy offline
        run: cargo clippy --workspace --all-targets --offline -- -D warnings

      - name: Verify frozen TDI-5.1 hashes
        run: |
          sha256sum -c \
            docs/TDI-5.1-CONTINUOUS-DEFICIT-GEOMETRY-PREREGISTRATION.sha256
          sha256sum -c \
            docs/TDI-5.1-CONTINUOUS-DEFICIT-GEOMETRY-EVALUATOR.sha256
          sha256sum -c \
            docs/TDI-5.1-SCIENTIFIC-CODE.sha256

      - name: Verify TDI-5.2 hashes and shell syntax
        run: |
          sha256sum -c \
            docs/TDI-5.2-INDEPENDENT-OVERLAP-ABLATION-PREREGISTRATION.sha256
          sha256sum -c \
            docs/TDI-5.2-INDEPENDENT-OVERLAP-ABLATION-EVALUATOR.sha256
          sha256sum -c \
            docs/TDI-5.2-SCIENTIFIC-CODE.sha256
          bash -n scripts/reproduce-tdi5.1.sh
          bash -n scripts/reproduce-tdi5.2.sh

      - name: Bounded termination smoke test
        run: >-
          cargo run
          --offline
          --bin tdi-independent-overlap-ablation-v52
          --
          --termination-smoke
